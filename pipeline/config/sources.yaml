# Cóndor View — Fuentes de extracción externas (CAPA 1)
# Spec: spec/condor-view-spec-capa1-extraccion.md §2
#
# Ema completa los <TODO> una sola vez al ver los *Fields* del FeatureServer
# de la UGDT. Mientras base_url sea <TODO>/vacío, el cliente ArcGIS degrada:
# devuelve None + warning y el pipeline cae al proxy OSM landuse (02_normativa.py).
#
# La presencia/ausencia de fos/fot/altura en field_map dispara Caso A vs B:
#   - valores no nulos  -> Caso A (atributos del feature)
#   - null              -> Caso B (resolver categoría contra zonas.yaml)

arcgis:
  base_url: "<TODO: https://HOST/server/rest/services/SERVICIO>"
  zonificacion:
    layer_id: "<TODO: id numérico de la capa de zonificación>"
    auth: none            # none | token
    token: null           # solo si auth: token
    # field_map: campo_real_arcgis -> nombre canónico.
    # Esquema UGDT/Mendoza (confirmado en IU_GC Godoy Cruz): categoría = 'zonific';
    # indicadores STRING con coma decimal y sentinel "..."; FOS/FOT en 3 variantes.
    # Si los fos_*/fot_* quedan null -> dispara Caso B (tabla zonas.yaml).
    field_map:
      categoria: "zonific"
      # FOS (0..1): 3 variantes; canónico = fos_1 (semántica sin confirmar)
      fos_1: "fos_1"
      fos_2: "fos_2"
      fos_3: "fos_3"
      # FOT (puede ser >1): 3 variantes
      fot_1: "fot_1"
      fot_2: "fot_2"
      fot_3: "fot_3"
      altura_max: "altura_max"   # metros (entero como string)
      densidad: null
      uso: null
  restricciones:
    layer_id: null        # null si no hay capa separada
  catastro:
    layer_id: null

overpass:
  endpoint: "https://overpass-api.de/api/interpreter"
  tipos:
    escuela:   'amenity~"school|kindergarten|college|university"'
    hospital:  'amenity~"hospital|clinic|doctors"'
    salud:     'amenity~"pharmacy"'
    banco:     'amenity~"bank|atm"'
    policia:   'amenity="police"'
    municipal: 'office="government"'
    plaza:     'leisure~"park|playground"'

terrain:
  dem_provider: srtm              # srtm (pipeline actual) | opentopography
  opentopo_dataset: COP30
  opentopo_api_key: null          # "<TODO>" solo si dem_provider: opentopography

crs:
  exchange: "EPSG:4326"
  # CRS métrico del proyecto: POSGAR 2007 faja 3 (Mendoza). Igual a config.yaml.
  metric: "EPSG:5343"
