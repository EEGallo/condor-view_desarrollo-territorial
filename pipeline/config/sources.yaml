# Cóndor View — Fuentes de extracción externas (CAPA 1)
# Spec: spec/condor-view-spec-capa1-extraccion.md §2
#
# Zonificación de San Rafael: capa de PARCELAS de la IDE Mendoza (mpipgis1).
# La capa trae la categoría de zona en el campo 'zona' pero NO indicadores
# (FOS/FOT/altura) -> field_map de indicadores en null -> dispara CASO B
# (resolver categoría contra config/zonas.yaml con la Ordenanza).
#
# Diagnóstico (PASO 0) sobre la capa real:
#   geometryType : esriGeometryPolygon (81.155 parcelas)
#   campo categoría: 'zona' -> valores: URBANA | SUBURBANA | RURAL | SECANA | ' '
#   sin campos fos/fot/altura -> Caso B
#
# PARA PASAR A CASO A (rellenar FOS/FOT/altura): se necesita que la UGDT publique
# una capa de parcelas con indicadores (como Capital/GC/Guaymallén). Qué pedir y
# cómo conectarlo: ver docs/pedido-ugdt-indicadores.md
# Cuando llegue: cambiar base_url/layer_id acá y mapear fos/fot/altura en field_map.

arcgis:
  base_url: "https://mpipgis1.mendoza.gov.ar/server/rest/services/Hosted/San_Rafael/FeatureServer"
  verify_ssl: false       # cert gov con cadena incompleta; sin verificación
  zonificacion:
    layer_id: "0"
    auth: none            # none | token
    token: null
    field_map:
      categoria: "zona"
      # San Rafael NO trae indicadores como atributos -> null -> Caso B
      fos_1: null
      fos_2: null
      fos_3: null
      fot_1: null
      fot_2: null
      fot_3: null
      altura_max: null
      densidad: null
      uso: null
  restricciones:
    layer_id: null
  catastro:
    layer_id: "0"          # la misma capa de parcelas sirve de catastro

overpass:
  endpoint: "https://overpass-api.de/api/interpreter"
  tipos:
    escuela:   'amenity~"school|kindergarten|college|university"'
    hospital:  'amenity~"hospital|clinic|doctors"'
    salud:     'amenity~"pharmacy"'
    banco:     'amenity~"bank|atm"'
    policia:   'amenity="police"'
    municipal: 'office="government"'
    plaza:     'leisure~"park|playground"'

terrain:
  dem_provider: srtm              # srtm (pipeline actual) | opentopography
  opentopo_dataset: COP30
  opentopo_api_key: null

crs:
  exchange: "EPSG:4326"
  # CRS métrico del proyecto: POSGAR 2007 faja 3 (Mendoza). Igual a config.yaml.
  metric: "EPSG:5343"
